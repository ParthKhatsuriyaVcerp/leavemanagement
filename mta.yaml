_schema-version: "3.1"
ID: leave-management
version: 1.0.0
description: Leave Management System with Multi-Level Approval

# ── Build parameters ──────────────────────────────────────────────
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx cds build --production

modules:
  # ── 1. CAP Node.js Backend ─────────────────────────────────────
  - name: leave-management-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
      CALLBACK_SECRET: "LeaveApp2024SecureCallback99"
      JWT_SECRET: "leave-app-secret-key-change-in-prod"
      SBPA_CLIENT_ID : "sb-5c5eaa6e-b969-4059-8bca-69700e85004f!b612345|xsuaa!b49390"
      SBPA_CLIENT_SECRET : "69ca1443-eac5-4f11-ae62-f44c1cc05daa$qyf-DZGnO9PBYHzZGz9w51LPfca8W4k7_tyit9K5YmM="
      SBPA_DEFINITION_ID : "us10.87727a89trial.leavemanagementprocess.leaveApprovalprocess"
      SBPA_WORKFLOW_URL : "https://spa-api-gateway-bpi-us-prod.cfapps.us10.hana.ondemand.com/workflow/rest/v1/workflow-instances"
      SBPA_UAA_URL : "https://87727a89trial.authentication.us10.hana.ondemand.com"
    properties:
      NODE_ENV: production
      JWT_SECRET: "${JWT_SECRET}"
      CALLBACK_SECRET: "${CALLBACK_SECRET}"
      CALLBACK_URL: "${default-url}"
      SBPA_WORKFLOW_URL: "${SBPA_WORKFLOW_URL}"
      SBPA_DEFINITION_ID: "${SBPA_DEFINITION_ID}"
      SBPA_UAA_URL: "${SBPA_UAA_URL}"
      SBPA_CLIENT_ID: "${SBPA_CLIENT_ID}"
      SBPA_CLIENT_SECRET: "${SBPA_CLIENT_SECRET}"
    requires:
      - name: leave-management-db
      - name: leave-management-uaa
    provides:
      - name: srv-api
        properties:
          srv-url: "${default-url}"

  # ── 2. HANA Database Deployer ──────────────────────────────────
  - name: leave-management-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    requires:
      - name: leave-management-db

  # ── 3. Frontend App Router ─────────────────────────────────────
  - name: leave-management-app
    type: staticfile
    path: app
    parameters:
      memory: 64M
      disk-quota: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: "~{srv-url}"
          timeout: 60000
      - name: leave-management-uaa
    provides:
      - name: app-api
        properties:
          app-url: "${default-url}"

resources:
  # ── HANA Cloud HDI Container ───────────────────────────────────
  - name: leave-management-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
    properties:
      hdi-service-name: "${service-name}"

  # ── XSUAA Authentication Service ──────────────────────────────
  - name: leave-management-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: leave-management-${org}-${space}
        tenant-mode: dedicated
