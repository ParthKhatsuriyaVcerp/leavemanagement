<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approver Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <span class="navbar-brand">Leave Management</span>
  <div class="navbar-right">
    <span id="navName"></span>
    <span class="role-badge" id="navRoleBadge">Approver</span>
    <span id="navLevelBadge" class="text-muted text-sm"></span>
    <button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="dashboard-layout">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="statPending"  style="color:#d97706">—</div>
      <div class="stat-label">Awaiting my approval</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statApproved" style="color:#059669">—</div>
      <div class="stat-label">Approved by me</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statRejected" style="color:#dc2626">—</div>
      <div class="stat-label">Rejected by me</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-label">Total visible</div>
    </div>
  </div>

  <!-- Page messages -->
  <div class="alert alert-error"   id="pageError"></div>
  <div class="alert alert-success" id="pageSuccess"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="pending">
      Pending My Approval
      <span id="pendingCount" style="margin-left:6px;background:#fef3c7;color:#92400e;padding:1px 7px;border-radius:10px;font-size:11px;"></span>
    </button>
    <button class="tab-btn" data-tab="history">All Team Requests</button>
  </div>

  <!-- Pending approvals tab -->
  <div class="tab-panel active" id="tab-pending">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Employee</th>
            <th>Type</th>
            <th>Start</th>
            <th>End</th>
            <th>Days</th>
            <th>Approval level</th>
            <th>Reason</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="pendingTable">
          <tr><td colspan="8" style="text-align:center;padding:32px;color:#9ca3af;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- All requests history tab -->
  <div class="tab-panel" id="tab-history">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Employee</th>
            <th>Type</th>
            <th>Start</th>
            <th>End</th>
            <th>Days</th>
            <th>Status</th>
            <th>Progress</th>
            <th>Comments</th>
          </tr>
        </thead>
        <tbody id="allTable">
          <tr><td colspan="8" style="text-align:center;padding:32px;color:#9ca3af;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Approve/Reject Modal -->
<div class="modal-backdrop hidden" id="modalBackdrop">
  <div class="modal-box">
    <div class="modal-title"    id="modalTitle">Approve leave</div>
    <div class="modal-subtitle" id="modalSubtitle"></div>

    <!-- Leave summary inside modal -->
    <div class="info-box" id="modalLeaveInfo" style="margin-bottom:16px;"></div>

    <div class="form-group">
      <label for="modalComments">Comments <span class="text-muted">(optional)</span></label>
      <textarea id="modalComments" placeholder="Add a note for the employee..."></textarea>
    </div>

    <div style="display:flex; gap:10px; margin-top:8px;">
      <button class="btn" id="modalConfirmBtn" style="flex:1;">Confirm</button>
      <button class="btn btn-ghost" id="modalCancelBtn" style="flex:1;">Cancel</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/approver.js"></script>
</body>
</html>
